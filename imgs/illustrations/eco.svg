<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-labelledby="ecoTitle" width="480" height="360">
  <title id="ecoTitle">An eco-friendly home with greenery and sunlight</title>
  <path d="M64 100 C36 142 50 212 112 244 C172 272 206 308 280 298 C366 287 430 240 420 176 C411 118 360 92 292 88 C208 83 96 64 64 100 Z" fill="#e7edf7"/>
  <!-- sun -->
  <circle cx="372" cy="118" r="26" fill="#b3873f" opacity="0.9"/>
  <g stroke="#b3873f" stroke-width="3" stroke-linecap="round"><path d="M372 78v-12M414 118h12M340 86l-8-8M404 86l8-8"/></g>
  <ellipse cx="240" cy="300" rx="150" ry="14" fill="#d8e0ee"/>
  <!-- house -->
  <g>
    <path d="M150 168 L240 110 L330 168 Z" fill="#2f5aa8"/>
    <rect x="166" y="168" width="148" height="120" fill="#ffffff" stroke="#cdd8ea" stroke-width="3"/>
    <rect x="166" y="168" width="148" height="14" fill="#1b2440"/>
    <rect x="210" y="226" width="60" height="62" fill="#2f5aa8"/>
    <path d="M240 226v62M210 256h60" stroke="#ffffff" stroke-width="3"/>
    <rect x="184" y="198" width="34" height="30" rx="3" fill="#8aa6dd"/>
    <rect x="262" y="198" width="34" height="30" rx="3" fill="#8aa6dd"/>
    <!-- solar panel on roof -->
    <g transform="rotate(-33 250 150)"><rect x="232" y="138" width="46" height="26" rx="2" fill="#1b2440"/><path d="M232 147h46M232 156h46M247 138v26M262 138v26" stroke="#3a6bc4" stroke-width="1.5"/></g>
  </g>
  <!-- tree -->
  <g>
    <rect x="92" y="232" width="12" height="58" rx="4" fill="#866225"/>
    <circle cx="98" cy="214" r="30" fill="#2f5aa8"/>
    <circle cx="78" cy="232" r="20" fill="#3a6bc4"/>
    <circle cx="118" cy="232" r="20" fill="#3a6bc4"/>
  </g>
  <!-- leaf accent -->
  <path d="M348 250 q26 -26 50 -6 q-6 32 -50 6 Z" fill="#2f5aa8"/>
  <path d="M352 246 q22 0 40 -2" stroke="#e7edf7" stroke-width="2" fill="none"/>
  <circle cx="120" cy="124" r="6" fill="#b3873f"/>
</svg>
